<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Como Estrelas na Terra (Curta)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Caveat:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#100F2E;--sky-2:#241F5E;--paper:#F7F1E1;--ink:#241F33;
    --marigold:#F4B63E;--vermilion:#E2533B;--teal:#27A39B;--lilac:#9B8BD6;--star:#FDE9A7;
    --pink:#E87FA6;--green:#7FBF6A;
    --deficiencia:#27A39B;--classe:#F4B63E;--genero:#E2533B;--raca:#9B8BD6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Nunito',sans-serif;color:var(--paper);overflow:hidden;
    background:radial-gradient(130% 110% at 50% -10%, var(--sky-2) 0%, var(--sky-1) 65%);
    transition:background 1.2s ease;-webkit-font-smoothing:antialiased}
  body.warm{--sky-2:#3a2a52}
  body.cold{--sky-2:#1c2748}
  .layer{position:fixed;inset:0;pointer-events:none}
  #stars{z-index:0}
  #stars i{position:absolute;border-radius:50%;background:var(--star);animation:tw 3.6s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}
  .shoot{position:absolute;top:14%;left:-12%;width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--star));
    border-radius:2px;filter:drop-shadow(0 0 6px var(--star));opacity:0}
  .shoot.go{animation:shoot 1.5s ease-in forwards}
  @keyframes shoot{0%{opacity:0;transform:translate(0,0) rotate(18deg)}15%{opacity:1}100%{opacity:0;transform:translate(120vw,46vh) rotate(18deg)}}
  #blobs i{position:absolute;border-radius:46% 54% 60% 40%;filter:blur(8px);opacity:.16;animation:drift 18s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(30px,-26px) rotate(40deg)}}
  .vignette{z-index:2;background:radial-gradient(120% 90% at 50% 50%,transparent 55%,rgba(6,5,22,.55))}

  /* paint wipe transition */
  .wipe{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0;transform:translateX(-115%);
    background:linear-gradient(90deg,transparent,var(--swipe,#F4B63E) 45%,var(--swipe,#F4B63E) 55%,transparent)}
  .wipe.go{animation:wipe .62s ease-in-out}
  @keyframes wipe{0%{transform:translateX(-115%);opacity:0}35%{opacity:.55}50%{transform:translateX(0)}100%{transform:translateX(115%);opacity:0}}

  .stage{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:clamp(14px,4vw,46px);text-align:center}
  .slide{display:none;width:100%;max-width:900px}
  .slide.active{display:block;animation:slideIn .7s cubic-bezier(.2,.75,.2,1)}
  @keyframes slideIn{from{opacity:0;transform:translateY(26px) scale(.985)}to{opacity:1;transform:none}}
  .eyebrow{font-family:'Fredoka',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;
    font-size:clamp(.6rem,2.3vw,.76rem);color:var(--star);opacity:.9;margin-bottom:.7em;animation:fadeUp .6s .1s backwards}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;line-height:1;font-size:clamp(2.1rem,8.4vw,4.4rem);letter-spacing:-.015em;
    background:linear-gradient(100deg,#fff,var(--marigold) 60%,var(--vermilion));-webkit-background-clip:text;background-clip:text;
    color:transparent;filter:drop-shadow(0 4px 18px rgba(244,182,62,.25))}
  h2{font-family:'Fredoka',sans-serif;font-weight:600;line-height:1.08;font-size:clamp(1.55rem,5.8vw,2.7rem);color:var(--paper);
    margin-top:.1em;animation:fadeUp .6s .25s backwards}
  .sub{font-family:'Caveat',cursive;font-weight:700;color:var(--marigold);font-size:clamp(1.4rem,5.4vw,2.3rem);margin-top:.2em;
    animation:fadeUp .6s .35s backwards}
  .desc{font-size:clamp(1rem,3.3vw,1.25rem);line-height:1.5;color:#EAE3D0;max-width:36ch;margin:.9em auto 0;opacity:.94;
    animation:fadeUp .6s .4s backwards}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .scene{position:relative;height:clamp(190px,36vh,320px);margin:0 auto;display:flex;align-items:flex-end;justify-content:center;
    gap:clamp(4px,1.6vw,24px);width:min(100%,660px)}
  .ground{position:absolute;left:-4%;right:-4%;bottom:0;height:26%;border-radius:50% 50% 0 0/100% 100% 0 0;
    background:rgba(0,0,0,.18);filter:blur(2px)}
  .ch{filter:drop-shadow(0 10px 9px rgba(0,0,0,.3));transform-origin:bottom center;display:block}

  /* idle + ACTIONS */
  .breathe{animation:breathe 3.4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .wobble{animation:wobble 2.8s ease-in-out infinite}
  @keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .enter{animation:enter .8s cubic-bezier(.2,.8,.2,1) backwards}
  .enter.d1{animation-delay:.15s}.enter.d2{animation-delay:.3s}.enter.d3{animation-delay:.45s}
  @keyframes enter{from{opacity:0;transform:translateY(40px) scale(.85)}to{opacity:1;transform:none}}
  .act-reach{animation:reach 2.4s ease-in-out infinite}
  @keyframes reach{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(4deg)}}
  .act-walkR{animation:walkR 1.1s cubic-bezier(.2,.8,.2,1) backwards, breathe 3.4s 1.1s ease-in-out infinite}
  @keyframes walkR{from{opacity:0;transform:translateX(120px)}to{opacity:1;transform:translateX(0)}}
  .act-walkL{animation:walkL 1.1s cubic-bezier(.2,.8,.2,1) backwards, breathe 3.4s 1.1s ease-in-out infinite}
  @keyframes walkL{from{opacity:0;transform:translateX(-120px)}to{opacity:1;transform:translateX(0)}}
  .act-cheer{animation:cheer .9s ease-in-out infinite}
  @keyframes cheer{0%,100%{transform:translateY(0) rotate(-3deg)}45%{transform:translateY(-16px) rotate(4deg)}}
  .act-sway{animation:sway 3.6s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .act-hop{animation:hop 1.1s ease-in-out infinite}
  @keyframes hop{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}55%{transform:translateY(0)}}
  .shakeit{animation:shakeit .5s ease-in-out 2}
  @keyframes shakeit{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}

  .board{position:absolute;top:4%;left:50%;transform:translateX(-50%);width:60%;height:42%;background:#243024;
    border:7px solid #6b4a2e;border-radius:6px;box-shadow:inset 0 0 30px rgba(0,0,0,.5);opacity:.9}
  .board::after{content:"A B C";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Caveat',cursive;font-size:clamp(1rem,4vw,1.8rem);color:rgba(247,241,225,.55);letter-spacing:.3em}
  .spot{position:absolute;top:-30%;left:50%;width:60%;height:155%;background:radial-gradient(60% 50% at 50% 30%,rgba(253,233,167,.35),transparent 70%);transform:translateX(-50%)}

  .book{width:clamp(92px,22vw,150px);height:clamp(70px,17vw,108px);background:var(--paper);border-radius:9px;
    box-shadow:0 12px 26px rgba(0,0,0,.4);position:relative;display:flex;align-items:center;justify-content:center}
  .book::before{content:"";position:absolute;left:50%;top:7%;bottom:7%;width:2px;background:#d8cdb0;transform:translateX(-50%)}
  .dance{display:flex;gap:.08em}
  .dance span{display:inline-block;font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.3rem,5vw,2.2rem);color:var(--ink);animation:dance 1.5s ease-in-out infinite}
  .dance span:nth-child(2){animation-delay:.18s;color:var(--vermilion)}
  .dance span:nth-child(3){animation-delay:.36s;color:var(--teal)}
  .dance span:nth-child(4){animation-delay:.1s;color:var(--marigold)}
  .dance span:nth-child(5){animation-delay:.5s;color:var(--lilac)}
  @keyframes dance{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(-26%) rotate(12deg)}}
  .calm{display:flex;gap:.14em;font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.3rem,5vw,2.2rem);color:var(--ink)}
  .calm span:nth-child(1){color:var(--teal)}.calm span:nth-child(2){color:var(--vermilion)}.calm span:nth-child(3){color:var(--marigold)}
  .spill{position:absolute;font-family:'Caveat',cursive;font-weight:700;color:var(--paper);font-size:clamp(1rem,3.6vw,1.6rem);animation:spill 2.6s ease-in infinite}
  @keyframes spill{0%{opacity:0;transform:translate(0,-10px) rotate(0)}20%{opacity:1}100%{opacity:0;transform:translate(var(--dx),60px) rotate(var(--dr))}}

  .dreamstar{position:absolute;top:6%;right:24%;font-size:clamp(1.8rem,6vw,2.8rem);color:var(--star);
    filter:drop-shadow(0 0 14px var(--star));animation:twirl 4s ease-in-out infinite}
  @keyframes twirl{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.15)}}
  .floaty{position:absolute;border-radius:50%;animation:floaty 5s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}

  .trophy{font-size:clamp(1.8rem,6vw,2.8rem);filter:drop-shadow(0 6px 10px rgba(0,0,0,.4));animation:breathe 3s ease-in-out infinite}
  .grade{font-family:'Fredoka',sans-serif;font-weight:700;color:var(--marigold);font-size:clamp(2rem,7vw,3.2rem);text-shadow:0 0 22px rgba(244,182,62,.6);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .report{font-family:'Caveat',cursive;font-weight:700;color:var(--vermilion);font-size:clamp(1.1rem,4vw,1.7rem);transform:rotate(-8deg)}

  .gate{display:flex;gap:6px;align-items:flex-end;height:100%}
  .gate i{width:8px;background:linear-gradient(var(--lilac),#4b447e);border-radius:5px 5px 0 0;height:clamp(130px,28vh,230px);box-shadow:inset -2px 0 4px rgba(0,0,0,.3)}
  @keyframes rain{to{transform:translateY(120%)}}

  .burst{position:absolute;left:50%;top:50%;width:40%;height:40%;border-radius:50%;opacity:0;transform:translate(-50%,-50%)}
  .burst.go{animation:burst 1s ease-out forwards}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.1)}40%{opacity:.5}100%{opacity:0;transform:translate(-50%,-50%) scale(3.4)}}
  .splat{position:absolute;border-radius:46% 54% 56% 44%;animation:pop .6s backwards}
  @keyframes pop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}

  .cards{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:32ch}
  .fcard{background:var(--paper);color:var(--ink);border-radius:12px;padding:.5em .55em .4em;width:clamp(72px,19vw,96px);
    box-shadow:0 8px 18px rgba(0,0,0,.3);transform:rotate(-3deg);animation:deal .5s backwards}
  .fcard:nth-child(even){transform:rotate(3deg)}
  .fcard .av{width:100%;padding-bottom:64%;border-radius:8px;margin-bottom:.35em}
  .fcard small{font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(.58rem,2.3vw,.76rem);display:block}
  @keyframes deal{from{opacity:0;transform:translateY(30px) rotate(-12deg) scale(.8)}}

  .easel{width:clamp(116px,26vw,172px);height:clamp(116px,26vw,172px);background:var(--paper);border:7px solid #7a5a3c;border-radius:8px;
    box-shadow:0 14px 30px rgba(0,0,0,.4);position:relative;overflow:hidden;transform:rotate(-2deg)}
  .easel .splash{position:absolute;border-radius:50%;animation:paintIn .6s backwards}
  @keyframes paintIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}

  .orbs{position:relative;height:clamp(170px,30vh,250px);display:flex;align-items:center;justify-content:center}
  .orbit{position:absolute;width:clamp(160px,42vw,240px);height:clamp(160px,42vw,240px);animation:spin 16s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .orb{position:absolute;width:clamp(60px,15vw,86px);height:clamp(60px,15vw,86px);border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-family:'Fredoka',sans-serif;font-weight:600;color:var(--ink);font-size:clamp(.62rem,2.5vw,.84rem);
    text-align:center;box-shadow:0 0 30px rgba(0,0,0,.3);animation:counter 16s linear infinite}
  @keyframes counter{to{transform:rotate(-360deg)}}
  .core{width:clamp(56px,14vw,82px);height:clamp(56px,14vw,82px);border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff,var(--marigold));
    box-shadow:0 0 50px rgba(244,182,62,.7);animation:pulse 2.4s ease-in-out infinite;z-index:1}

  .lenswrap{margin-top:1.1em;display:flex;gap:.5em;justify-content:center;flex-wrap:wrap;animation:fadeUp .6s .5s backwards}
  .lens{font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(.72rem,2.8vw,.92rem);padding:.42em .95em;border-radius:999px;
    color:var(--ink);display:inline-flex;align-items:center;gap:.45em;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .lens::before{content:"";width:.55em;height:.55em;border-radius:50%;background:rgba(0,0,0,.4)}
  .l-def{background:var(--deficiencia)}.l-cla{background:var(--classe)}.l-gen{background:var(--genero);color:#fff}.l-rac{background:var(--raca);color:#fff}

  .narration{display:none;margin:1.2em auto 0;max-width:62ch;text-align:left;background:rgba(247,241,225,.07);border:1px solid rgba(247,241,225,.18);
    border-radius:16px;padding:1em 1.2em;font-size:clamp(.95rem,3vw,1.08rem);line-height:1.55;color:#F1EAD6}
  .narration.show{display:block;animation:fadeUp .35s}
  .narration b{font-family:'Fredoka',sans-serif;color:var(--marigold);font-weight:600}

  .bar{position:fixed;left:0;right:0;bottom:0;z-index:8;display:flex;gap:.5em;justify-content:center;flex-wrap:wrap;
    padding:clamp(10px,2.4vw,18px);background:linear-gradient(transparent,rgba(8,7,26,.7) 45%)}
  button{font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(.8rem,2.8vw,1rem);border:none;border-radius:999px;
    padding:.6em 1.1em;cursor:pointer;color:var(--ink);background:var(--paper);transition:transform .15s,filter .15s}
  button:hover{filter:brightness(1.06)}button:active{transform:scale(.95)}
  button:focus-visible{outline:3px solid var(--marigold);outline-offset:2px}
  button.ghost{background:rgba(247,241,225,.13);color:var(--paper);border:1px solid rgba(247,241,225,.3)}
  button.play{background:var(--vermilion);color:#fff}
  button.on{background:var(--green);color:#10210a}
  .vpick{font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(.72rem,2.5vw,.9rem);border-radius:999px;
    padding:.55em .9em;border:1px solid rgba(247,241,225,.3);background:rgba(247,241,225,.13);color:var(--paper);
    cursor:pointer;max-width:46vw;text-overflow:ellipsis}
  .vpick option{color:#111}
  .bubble{position:fixed;z-index:9;max-width:min(72vw,440px);background:var(--paper);color:var(--ink);
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(.9rem,3vw,1.12rem);line-height:1.32;
    padding:.7em 1em;border-radius:16px;border:3px solid var(--paper);box-shadow:0 10px 26px rgba(0,0,0,.4);display:none;text-align:center}
  .bubble::after{content:"";position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);border:8px solid transparent;border-top-color:var(--paper)}
  button[disabled]{opacity:.4;cursor:default}
  .start{margin-top:1.7em;background:linear-gradient(100deg,var(--marigold),var(--vermilion));color:#fff;font-size:clamp(1.05rem,3.8vw,1.25rem);
    padding:.75em 1.8em;box-shadow:0 10px 30px rgba(226,83,59,.45)}

  .dots{position:fixed;top:clamp(46px,12vw,54px);left:50%;transform:translateX(-50%);z-index:8;display:flex;gap:6px}
  .dots i{width:7px;height:7px;border-radius:50%;background:rgba(247,241,225,.28);transition:.25s}
  .dots i.on{background:var(--marigold);width:22px;border-radius:6px}
  .counter{position:fixed;top:clamp(46px,12vw,54px);right:clamp(14px,4vw,24px);z-index:8;font-family:'Fredoka',sans-serif;font-size:.8rem;color:rgba(247,241,225,.55)}
  .confetti{position:fixed;top:-12px;width:11px;height:14px;z-index:7;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(108vh) rotate(720deg);opacity:.9}}

  /* ---- extras de cena (nova direção de arte) ---- */
  .imag{position:absolute;animation:floaty 5s ease-in-out infinite;font-family:'Fredoka',sans-serif;font-weight:700}
  .sun{position:absolute;width:clamp(30px,7vw,46px);height:clamp(30px,7vw,46px);border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#fff,var(--marigold));box-shadow:0 0 22px rgba(244,182,62,.7);animation:floaty 6s ease-in-out infinite}
  .planet{position:absolute;width:clamp(24px,6vw,38px);height:clamp(24px,6vw,38px);border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,var(--lilac));animation:floaty 7s ease-in-out infinite}
  .planet::after{content:"";position:absolute;left:-26%;top:38%;width:152%;height:24%;border-radius:50%;border:3px solid var(--teal);transform:rotate(-18deg)}
  .classrow{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:flex-end;gap:clamp(2px,1.5vw,16px);z-index:0}
  .seat{display:flex;flex-direction:column;align-items:center}
  .desk{width:clamp(34px,9vw,56px);height:11px;border-radius:4px;background:#6b4a2e;margin-top:-8px;box-shadow:0 4px 9px rgba(0,0,0,.28);position:relative;z-index:3}
  .laugh{animation:laugh .35s ease-in-out infinite}
  @keyframes laugh{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-6px) rotate(4deg)}}
  .haha{position:absolute;font-family:'Caveat',cursive;font-weight:700;color:var(--ink);font-size:clamp(1.1rem,4.4vw,2rem);opacity:0;z-index:4;animation:hahaUp 2.2s ease-out infinite}
  @keyframes hahaUp{0%{opacity:0;transform:translateY(12px) rotate(-8deg)}25%{opacity:1}100%{opacity:0;transform:translateY(-52px) rotate(10deg)}}
  .ten{position:absolute;top:-6%;font-family:'Fredoka',sans-serif;font-weight:700;color:var(--marigold);font-size:clamp(1.1rem,4.4vw,2rem);text-shadow:0 0 12px rgba(244,182,62,.7);opacity:0;animation:tenUp 2.4s ease-out infinite}
  @keyframes tenUp{0%{opacity:0;transform:translateY(10px) scale(.7)}28%{opacity:1}100%{opacity:0;transform:translateY(-64px) scale(1.15)}}
  .glow{position:absolute;width:clamp(120px,30vw,210px);height:clamp(120px,30vw,210px);border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(244,182,62,.6),transparent 68%);animation:pulse 3s ease-in-out infinite}
  .recede{animation:recede 3.2s ease-out forwards}
  @keyframes recede{0%{transform:translateX(0) scale(.82);filter:grayscale(.15)}100%{transform:translateX(8%) scale(.66);filter:grayscale(.92) brightness(.9)}}
  .cagebox{position:relative;padding:clamp(8px,2vw,14px);border:5px solid var(--lilac);border-radius:10px;background:rgba(75,68,126,.14);box-shadow:inset 0 0 22px rgba(0,0,0,.3)}
  .cagebox::before,.cagebox::after{content:"";position:absolute;left:8%;right:8%;height:4px;background:rgba(75,68,126,.55);border-radius:3px}
  .cagebox::before{top:34%}.cagebox::after{top:64%}
  .playL{display:inline-block;font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.7rem,6.4vw,3rem);animation:playB 1.3s ease-in-out infinite}
  @keyframes playB{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(-18px) rotate(9deg)}}
  .spark{position:absolute;color:var(--star);font-size:clamp(1rem,3.4vw,1.5rem);animation:twirl 2.4s ease-in-out infinite;filter:drop-shadow(0 0 6px var(--marigold))}
  .fcol{display:flex;flex-direction:column;align-items:center;gap:6px}
  .port{width:100%;aspect-ratio:1;background:#FBF8EF;border-radius:8px;overflow:hidden;margin-bottom:.3em;display:flex}
  .port svg{width:100%;height:100%}
  .artmini{background:#fff;border-radius:9px;padding:3px;box-shadow:0 5px 12px rgba(0,0,0,.22);transform:rotate(2deg);width:clamp(48px,12vw,64px)}
  .artmini:nth-child(odd){transform:rotate(-2deg)}
  .artmini svg{width:100%;display:block;border-radius:6px}
  .artmini small{font-size:.54rem;color:var(--muted);display:block;text-align:center;margin-top:1px}
  /* ---- fecho: muro de barreiras ---- */
  .closewall{position:relative;height:clamp(180px,30vh,260px);max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:center}

const scenes=[
 {type:"intro",eyebrow:"Trilha investigativa · Educação inclusiva",title:"Como Estrelas na Terra",sub:"Toda criança é especial",
  desc:"A institucionalização do ensino: barreiras no acesso à educação inclusiva",dur:6500,tint:"#F4B63E",mus:{chord:[60,64,67,74],tempo:600},body:"",
  narration:"A institucionalização do ensino e as barreiras no acesso à educação inclusiva. Quando a escola se organiza como uma instituição padronizada, com um único método, um único ritmo e uma única forma de avaliar, ela própria levanta obstáculos para quem aprende diferente. A partir do filme <b>Como Estrelas na Terra</b>, este curta observa como essas barreiras se erguem na trajetória de Ishaan, um menino com dislexia, e o que é preciso para derrubá-las."},

 {num:1,title:"O mundo do Ishaan",art:"wonder",desc:"",

      <span class="haha" style="left:38%;top:6%;animation-delay:2.7s">ha ha!</span>
      <span class="haha" style="left:56%;top:16%;animation-delay:3.2s">kkk</span>
      <span class="haha" style="left:32%;top:20%;animation-delay:3.5s">haha</span>

        <span class="spill" style="left:6%;--dx:-26px;--dr:-120deg;animation-delay:.2s">a</span>
        <span class="spill" style="right:4%;--dx:30px;--dr:160deg;animation-delay:.9s">o</span></div></div>`;

      <div id="bro" style="position:relative;z-index:2;text-align:center">${brother("excited",1)}
        <span class="ten" style="left:24%;animation-delay:.2s">10</span>
        <span class="ten" style="left:52%;animation-delay:.9s">10</span>
        <span class="ten" style="left:38%;animation-delay:1.6s">10</span></div>
      <div style="width:7vw"></div>
      <div class="recede" id="hero" style="position:relative;z-index:1;text-align:center">${ishaan("sad",.82)}<div class="report">repetente</div></div></div>`;
    case "gate": return `<div class="scene" id="rainScene">${g}
      <div class="gate enter d1"><i></i><i></i><i></i></div>
      <div class="cagebox enter d2" style="filter:grayscale(.55)"><div class="act-sway" id="hero">${ishaan("sad",.84)}</div></div>
      <div class="gate enter d1"><i></i><i></i><i></i></div></div>`;
    case "teacher": return `<div class="scene" id="burstScene">${g}
      <div class="burst" id="burstFx" style="background:radial-gradient(circle,var(--marigold),var(--vermilion))"></div>
      <span class="splat" style="left:12%;top:18%;width:34px;height:34px;background:var(--teal);animation-delay:.2s"></span>

    case "tutoring": return `<div class="scene">${g}
      <span class="spark" style="left:30%;top:12%;animation-delay:.2s">✦</span>
      <span class="spark" style="right:34%;top:20%;animation-delay:1s">✦</span>
      <span class="spark" style="left:46%;top:8%;animation-delay:1.6s">✦</span>
      <div class="act-walkL" id="teach">${nikumbh("happy",1.12)}</div>
      <div style="display:flex;gap:.05em;align-items:flex-end">
        <span class="playL" style="color:var(--vermilion)">a</span>

        <span class="playL" style="color:var(--lilac);animation-delay:.6s">!</span></div>
      <div class="breathe" id="hero">${ishaan("surprised",.9)}</div></div>`;
    case "cards": return `<div class="scene">${g}
      <div class="cards">
        ${famous(PORTRAIT.einstein,"Einstein",ART.einstein,"E = mc²")}
        ${famous(PORTRAIT.picasso,"Picasso",ART.picasso,"Cubismo")}

    case "easel": return `<div class="scene" id="winScene">${g}<div class="spot"></div>
      <div class="enter d1 easel">
        <span class="splash" style="width:46%;height:46%;background:var(--vermilion);left:8%;top:10%;animation-delay:.5s"></span>

  }
}

/* per-scene acting: timed expression changes on #hero */
const LINES={
  wonder:[["narrator","Esse é o Ishaan. Um menino que enxerga o mundo cheio de cores."],["ishaan","Olha só... as estrelas!"]],
  classroom:[["ishaan","As letras... ficam dançando na minha frente."],["strict","Leia direito! Por que você não presta atenção?"],["narrator","A dificuldade dele é tratada como preguiça."]],
  compare:[["brother","Tirei dez de novo!"],["narrator","E o Ishaan é cobrado o tempo todo pra ser igual ao irmão."]],
  gate:[["ishaan","Eu só queria voltar pra casa..."],["narrator","No internato, o menino vai se fechando."]],
  teacher:[["nikumbh","Cada criança aprende do seu jeito. Inclusive você."],["narrator","A chegada do professor muda tudo."]],
  tutoring:[["nikumbh","Vamos transformar as letras numa brincadeira."],["ishaan","Eu consegui... eu li!"]],
  cards:[["nikumbh","Einstein, Picasso, Leonardo da Vinci... todos eram disléxicos."]],
  easel:[["ishaan","Eu pintei isso!"],["narrator","E a escola, enfim, enxerga o que ele tem de melhor."]]
};
const CHOREO={
  wonder:{b:ishaan,sc:1,steps:[[1400,"excited"]]},
  classroom:{b:ishaan,sc:1,steps:[[1100,"surprised",true],[2900,"sad"]]},
  gate:{b:ishaan,sc:.84,gray:true,steps:[[1800,"cry"]]},
  teacher:{b:ishaan,sc:.82,steps:[[1700,"surprised",true],[3300,"happy"]]},
  tutoring:{b:ishaan,sc:.9,steps:[[2200,"happy",true]]},
  cards:{b:ishaan,sc:.8,steps:[[1400,"excited",true]]},
  easel:{b:ishaan,sc:.95,steps:[[1900,"excited",true]]}
};
let actTimers=[];
function runChoreo(art){
  actTimers.forEach(clearTimeout); actTimers=[];
  const c=CHOREO[art]; if(!c) return;
  c.steps.forEach(([ms,expr,pop])=>{
    actTimers.push(setTimeout(()=>{
      const el=document.getElementById("hero"); if(!el) return;
      el.innerHTML=c.b(expr,c.sc);
      if(c.gray) el.style.filter="grayscale(.55)";
      if(pop){el.classList.remove("shakeit");void el.offsetWidth;el.classList.add("shakeit");}
      if(art==="easel"&&expr==="excited"){el.classList.add("act-hop");}
    },ms));
  });
}

/* ===== RENDER ===== */
function render(i){
  const s=scenes[i]; let h='<div class="slide active">';
  if(s.type==="intro"){
    h+=`<div class="eyebrow">${s.eyebrow}</div>
      <div class="scene" style="height:auto;margin-bottom:.4em"><div class="book cover wobble"><div class="covertitle">
        <div class="dance"><span style="color:var(--vermilion);animation-delay:0s">E</span><span style="color:var(--teal);animation-delay:.18s">d</span><span style="color:var(--marigold);animation-delay:.36s">u</span><span style="color:var(--lilac);animation-delay:.1s">c</span><span style="color:var(--green);animation-delay:.5s">a</span><span style="color:var(--pink);animation-delay:.28s">ç</span><span style="color:var(--vermilion);animation-delay:.12s">ã</span><span style="color:var(--teal);animation-delay:.4s">o</span></div>
        <div class="dance"><span style="color:var(--marigold);animation-delay:.2s">I</span><span style="color:var(--lilac);animation-delay:.05s">n</span><span style="color:var(--green);animation-delay:.33s">c</span><span style="color:var(--pink);animation-delay:.15s">l</span><span style="color:var(--vermilion);animation-delay:.45s">u</span><span style="color:var(--teal);animation-delay:.25s">s</span><span style="color:var(--marigold);animation-delay:.1s">i</span><span style="color:var(--lilac);animation-delay:.38s">v</span><span style="color:var(--green);animation-delay:.5s">a</span></div>
      </div></div></div>
      <h1>${s.title}</h1><div class="sub">${s.sub}</div><p class="desc">${s.desc}</p>`;
  } else if(s.type==="close"){
    h+=`<div class="eyebrow">${s.eyebrow}</div>
      <div class="closewall">
        <div class="warmdoor"></div>
        <div class="heroor">${ishaan("happy",1)}</div>
        ${s.barriers.map((b,k)=>`<div class="barrier bz${k}">${b}</div>`).join("")}
      </div>
      <h2>${s.title}</h2><div class="sub">${s.sub}</div>`;
  } else {
    h+=`<div class="eyebrow">Cena ${s.num} de 8</div>${buildArt(s)}
      <h2>${s.title}</h2><p class="desc">${s.desc}</p>
      <div class="lenswrap">${s.lens.map(l=>`<span class="lens ${l[0]}">${l[1]}</span>`).join("")}</div>`;
  }
  h+=`<div class="narration ${notesOn?'show':''}">${s.narration}</div>`;
  if(i===0) h+=`<div style="text-align:center"><button class="start" id="go">Começar a história ›</button></div>`;
  h+='</div>'; stage.innerHTML=h;

  document.body.classList.remove("warm","cold"); if(s.body) document.body.classList.add(s.body);
  dots.innerHTML=scenes.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join("");
  counter.textContent=(i+1)+" / "+scenes.length;
  prev.disabled=i===0; next.textContent=i===scenes.length-1?"Reiniciar ↺":"Avançar ›";
  const go=document.getElementById("go"); if(go) go.onclick=()=>nav(1);

  runChoreo(s.art);
  if(s.art==="gate") makeRain();
  if(s.art==="teacher"){const b=document.getElementById("burstFx"); if(b) requestAnimationFrame(()=>b.classList.add("go"));}
  if(s.art==="easel"){ setTimeout(()=>confetti(130),1300); setTimeout(()=>confetti(100),3000); }
  if(s.type==="intro"||s.type==="close") shootStar();
  setMood(s.mus);
  if(voiceOn) speakScene(i);
}

/* ===== FX ===== */
function makeRain(){const sc=document.getElementById("rainScene"); if(!sc) return;
  for(let n=0;n<34;n++){const r=document.createElement("span");
    r.style.cssText=`position:absolute;top:-10%;left:${Math.random()*100}%;width:2px;height:16px;border-radius:2px;background:linear-gradient(rgba(155,139,214,0),rgba(200,212,240,.85));animation:rain ${0.5+Math.random()*0.5}s linear ${Math.random()}s infinite`;
    sc.appendChild(r);}}
const CC=["#F4B63E","#E2533B","#27A39B","#9B8BD6","#E87FA6","#FDE9A7","#7FBF6A"];
function confetti(n){for(let i=0;i<n;i++){const c=document.createElement("div");c.className="confetti";
  c.style.left=Math.random()*100+"vw";c.style.background=CC[i%CC.length];c.style.animationDuration=(1.6+Math.random()*1.6)+"s";
  c.style.animationDelay=(Math.random()*.5)+"s";c.style.transform=`rotate(${Math.random()*360}deg)`;
  if(Math.random()>.5)c.style.borderRadius="50%";document.body.appendChild(c);setTimeout(()=>c.remove(),3600);}}
function shootStar(){const s=document.getElementById("shoot");s.classList.remove("go");void s.offsetWidth;s.classList.add("go");}
function doWipe(tint){const w=document.getElementById("wipe");w.style.setProperty("--swipe",tint||"#F4B63E");
  w.classList.remove("go");void w.offsetWidth;w.classList.add("go");}

/* ===== MUSIC (procedural, mood per scene) ===== */
let actx=null,master=null,padA=null,padB=null,padG=null,arpTimer=null,musOn=false,curChord=[60,64,67,72],arpDelay=560,arpStep=0;
const midiF=m=>440*Math.pow(2,(m-69)/12);
function startAudio(){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
  padG=actx.createGain(); padG.gain.value=.05; padG.connect(master);
  padA=actx.createOscillator(); padB=actx.createOscillator();
  padA.type="sine"; padB.type="sine"; padB.detune.value=7;
  padA.connect(padG); padB.connect(padG); padA.start(); padB.start();
  setMood(scenes[idx].mus,true);
}
function setMood(m,instant){
  if(!actx||!m) return;
  curChord=m.chord; arpDelay=m.tempo;
  const t=actx.currentTime+(instant?0:.05), tt=instant?0:.9;
  padA.frequency.linearRampToValueAtTime(midiF(m.chord[0]-12),t+tt);
  padB.frequency.linearRampToValueAtTime(midiF(m.chord[1]-12),t+tt);
}
function pluck(f){
  const o=actx.createOscillator(),gg=actx.createGain(),t=actx.currentTime;
  o.type="triangle"; o.frequency.value=f;
  gg.gain.setValueAtTime(0,t); gg.gain.linearRampToValueAtTime(.12,t+.03); gg.gain.exponentialRampToValueAtTime(.001,t+.95);
  o.connect(gg); gg.connect(master); o.start(t); o.stop(t+1);
}
function arp(){clearTimeout(arpTimer); if(!musOn) return;
  const idx2=arpStep%(curChord.length*2);
  const base=curChord[idx2%curChord.length]+(idx2>=curChord.length?12:0);
  pluck(midiF(base)); arpStep++; arpTimer=setTimeout(arp,arpDelay);}
function toggleMusic(){
  if(!actx){startAudio();}
  musOn=!musOn;
  if(musOn){music.classList.add("on");music.textContent="🔊 Música";
    master.gain.cancelScheduledValues(actx.currentTime);
    master.gain.linearRampToValueAtTime(.5,actx.currentTime+.6); arp();}
  else{music.classList.remove("on");music.textContent="🔇 Música";
    master.gain.linearRampToValueAtTime(0,actx.currentTime+.4); clearTimeout(arpTimer);}
}

/* ===== VOICE: NARRATOR + CHARACTER VOICES ===== */
let voiceOn=false, ptVoice=null, voiceA=null, voiceB=null, currentUtter=null, allVoices=[], speakSession=0;
function scoreVoice(v){let s=0;const n=(v.name||'').toLowerCase(),l=(v.lang||'').toLowerCase();
  if(/pt[-_]?br/.test(l))s+=100; else if(/^pt/.test(l))s+=55;
  if(/natural|neural|online|enhanced|premium/.test(n))s+=45;
  if(/google/.test(n))s+=30;
  if(/luciana|francisca|maria|thalita|camila|vit[oó]ria|hortense|fernanda/.test(n))s+=12;
  if(/compact|eloquence|robot|cellos|zarvox|grandma/.test(n))s-=40;
  return s;}
function pickVoice(){ if(!allVoices.length) return; let best=null,bs=-1e9;
  allVoices.forEach(v=>{const sc=scoreVoice(v); if(sc>bs){bs=sc;best=v;}}); if(best)ptVoice=best; }
function setAB(){ voiceA=ptVoice; voiceB=allVoices.filter(v=>/^pt/i.test(v.lang)&&v.name!==(ptVoice&&ptVoice.name)).sort((a,b)=>scoreVoice(b)-scoreVoice(a))[0]||ptVoice; }
function buildVoiceMenu(){ const el=document.getElementById('voicePick'); if(!el) return;
  let list=allVoices.filter(v=>/^pt/i.test(v.lang)); if(!list.length) list=allVoices.slice();
  list.sort((a,b)=>scoreVoice(b)-scoreVoice(a));
  el.innerHTML=list.map(v=>`<option value="${v.name}">${v.name.replace(/Microsoft|Google/g,'').trim()}${/pt[-_]?br/i.test(v.lang)?' (BR)':''}</option>`).join('')||'<option>voz padrão</option>';
  if(ptVoice) el.value=ptVoice.name;
  el.onchange=()=>{ ptVoice=allVoices.find(v=>v.name===el.value)||ptVoice; setAB(); if(voiceOn) speakScene(idx); };
}
function loadVoices(){ try{allVoices=speechSynthesis.getVoices()||[];}catch(e){allVoices=[];}
  if(allVoices.length){ if(!ptVoice)pickVoice(); setAB(); buildVoiceMenu(); } }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }

const VOICEMAP={ narrator:{pitch:1.0,rate:1.06,v:0}, ishaan:{pitch:1.5,rate:1.18,v:0}, nikumbh:{pitch:.82,rate:1.0,v:1},
  brother:{pitch:1.25,rate:1.22,v:0}, strict:{pitch:.78,rate:1.2,v:1}, turma:{pitch:1.35,rate:1.22,v:0} };
const BUBCOLOR={ishaan:"var(--teal)",nikumbh:"var(--marigold)",brother:"#5a86c4",strict:"#c0566f",turma:"var(--lilac)"};
const BUBEL={ishaan:"hero",nikumbh:"teach",brother:"bro",strict:"bro",turma:"mate"};
function ensureBubble(){ let b=document.getElementById('bubble'); if(!b){b=document.createElement('div');b.id='bubble';b.className='bubble';document.body.appendChild(b);} return b; }
function showBubble(line){ const b=ensureBubble(); b.textContent=line[1]; b.style.borderColor=BUBCOLOR[line[0]]||'var(--paper)'; b.style.display='block';
  const el=document.getElementById(BUBEL[line[0]]||''); const r=el&&el.getBoundingClientRect();
  if(r){ b.style.left=Math.min(Math.max(r.left+r.width/2,100),innerWidth-100)+'px'; b.style.top=(r.top-16)+'px'; b.style.transform='translate(-50%,-100%)'; }
  else { b.style.left='50%'; b.style.top='34%'; b.style.transform='translate(-50%,-100%)'; } }
function hideBubble(){ const b=document.getElementById('bubble'); if(b) b.style.display='none'; }
function buildQueue(i){ const s=scenes[i]; const L=(typeof LINES!=='undefined')&&LINES[s.art];
  if(L&&L.length) return L; return [["narrator", s.narration.replace(/<[^>]+>/g,'').replace(/[“”]/g,'"')]]; }
function speakLine(line,done){
  const m=VOICEMAP[line[0]]||VOICEMAP.narrator; const u=new SpeechSynthesisUtterance(line[1]);
  const vv=(m.v===1?voiceB:voiceA)||ptVoice; if(vv){u.voice=vv;u.lang=vv.lang||'pt-BR';} else u.lang='pt-BR';
  u.pitch=m.pitch; u.rate=m.rate;
  if(line[0]!=='narrator') showBubble(line); else hideBubble();
  u.onend=()=>{ hideBubble(); done&&done(); };
  currentUtter=u; speechSynthesis.speak(u);
}
function speakScene(i){
  if(!voiceOn||!('speechSynthesis' in window)) return;
  try{speechSynthesis.cancel();}catch(e){} hideBubble();
  const session=++speakSession; const q=buildQueue(i); let qi=0;
  (function step(){ if(session!==speakSession) return;
    if(qi>=q.length){ if(playing&&voiceOn){ if(idx<scenes.length-1) nav(1); else stopMovie(); } return; }
    speakLine(q[qi++], step); })();
}
function setDuck(){ if(actx&&musOn){ master.gain.linearRampToValueAtTime(voiceOn?.22:.5, actx.currentTime+.4); } }
function toggleVoice(){
  voiceOn=!voiceOn;
  if(voiceOn){ voice.classList.add("on"); voice.textContent="🎙️ Voz"; clearTimeout(timer); setDuck(); speakScene(idx); }
  else{ voice.classList.remove("on"); voice.textContent="🔇 Voz"; speakSession++; try{speechSynthesis.cancel();}catch(e){} hideBubble(); setDuck(); if(playing) schedule(); }
}

/* ===== NAV + MOVIE ===== */
let idx=0,notesOn=false,playing=false,timer=null;
const stage=document.getElementById("stage"),dots=document.getElementById("dots"),counter=document.getElementById("counter"),
  prev=document.getElementById("prev"),next=document.getElementById("next"),notes=document.getElementById("notes"),
  movie=document.getElementById("movie"),music=document.getElementById("music"),voice=document.getElementById("voice");
function schedule(){clearTimeout(timer); if(playing&&!voiceOn){timer=setTimeout(()=>{ if(idx<scenes.length-1) nav(1); else stopMovie(); }, scenes[idx].dur||7000);}}
function nav(d){const t=scenes[Math.min(Math.max(idx+d,0),scenes.length-1)]?.tint; doWipe(t); idx+=d; if(idx<0)idx=0; if(idx>=scenes.length)idx=0; render(idx); schedule();}
function stopMovie(){playing=false;clearTimeout(timer);movie.textContent="▶ Modo filme";movie.classList.add("play");}
function startMovie(){playing=true; if(idx>=scenes.length-1) idx=0; movie.textContent="⏸ Pausar";movie.classList.remove("play");render(idx);schedule();}
next.onclick=()=>nav(1); prev.onclick=()=>nav(-1); movie.onclick=()=>playing?stopMovie():startMovie(); music.onclick=toggleMusic; voice.onclick=toggleVoice;
notes.onclick=()=>{notesOn=!notesOn;notes.textContent=notesOn?"🙈 Ocultar":"📖 Narração";document.querySelector(".narration")?.classList.toggle("show",notesOn);};
document.addEventListener("keydown",e=>{ if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();nav(1);} if(e.key==="ArrowLeft")nav(-1);});

/* ambient */
const sf=document.getElementById("stars");
for(let n=0;n<70;n++){const s=document.createElement("i");s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";
  s.style.animationDelay=(Math.random()*3.6)+"s";const z=1+Math.random()*2.6;s.style.width=s.style.height=z+"px";s.style.opacity=(.3+Math.random()*.5);sf.appendChild(s);}
const bl=document.getElementById("blobs");const bc=["#F4B63E","#E2533B","#27A39B","#9B8BD6"];
for(let n=0;n<5;n++){const b=document.createElement("i");const sz=120+Math.random()*160;b.style.width=b.style.height=sz+"px";
  b.style.left=Math.random()*90+"%";b.style.top=Math.random()*80+"%";b.style.background=bc[n%bc.length];b.style.animationDelay=(Math.random()*8)+"s";bl.appendChild(b);}

render(0); setTimeout(shootStar,800);
</script>
